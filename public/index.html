    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#114c5f" />
    <script>
      (function () {
        var storageKey = "portfolio-theme-preference";
        var isTheme = function (value) {
          return value === "light" || value === "dark";
        };
        var root = document.documentElement;

        try {
          var storedTheme = window.localStorage.getItem(storageKey);
          var systemTheme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          var theme = isTheme(storedTheme) ? storedTheme : systemTheme;
          var themeColor = theme === "dark" ? "#08111a" : "#114c5f";
          var themeMetaTag = document.querySelector('meta[name="theme-color"]');

          root.dataset.theme = theme;
          root.style.colorScheme = theme;

          if (themeMetaTag) {
            themeMetaTag.setAttribute("content", themeColor);
          }
        } catch (error) {
          var fallbackTheme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

          root.dataset.theme = fallbackTheme;
          root.style.colorScheme = fallbackTheme;
        }
      })();
    </script>
